name: Test DeepSeek API Connection

on:
  workflow_dispatch:  # 仅手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
    - name: Test OpenRouter API (via DeepSeek)
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      run: |
        echo "🔍 测试 OpenRouter API 连通性..."
        echo "时间: $(TZ=Asia/Shanghai date)"
        
        # 发送一个极简请求
        response=$(curl -s -w "\n%{http_code}" --max-time 120 \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $OPENROUTER_API_KEY" \
          -H "HTTP-Referer: https://heyijiapack.com" \
          -H "X-Title: HeYiJia Test" \
          -d '{
            "model": "google/gemini-2.0-flash-exp:free",
            "messages": [{"role": "user", "content": "Say OK"}],
            "max_tokens": 10,
            "stream": false
          }' \
          https://openrouter.ai/api/v1/chat/completions)
        
        http_code=$(echo "$response" | tail -n1)
        body=$(echo "$response" | sed '$d')
        
        echo "📡 HTTP 状态码: $http_code"
        echo "📦 响应内容:"
        echo "$body" | head -c 500
        
        if [ "$http_code" = "200" ]; then
          echo ""
          echo "✅ OpenRouter API 连接正常!"
        else
          echo ""
          echo "❌ OpenRouter API 异常!"
          exit 1
        fi

